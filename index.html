<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Bhatti</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(to right, #ff512f, #dd2476);
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
}

/* MENU SECTION */
.menu {
  padding: 40px 20px;
  text-align: center;
}

.menu h2 {
  font-size: 28px;
  margin-bottom: 20px;
}

/* FOOD GRID */
.food-gallery {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.food-item {
  background: #1c1c1c;
  border-radius: 12px;
  padding: 10px;
  width: 260px;
  transition: 0.3s;
}

.food-item:hover {
  transform: scale(1.05);
}

.food-item img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.food-item h3 {
  margin: 10px 0 5px;
}

.food-item p {
  color: #bbb;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  background: #000;
  margin-top: 30px;
}
</style>

</head>
<body>

<!-- HERO -->
<div class="hero">
  <h1>Modern Bhatti</h1>
  <p>Delicious Food • Fast Service • Best Taste</p>
</div>

<!-- MENU -->
<div class="menu">
  <h2>Our Popular Dishes</h2>

  <div class="food-gallery">

    <div class="food-item">
      <img src="images/bbq.jpg" alt="BBQ">
      <h3>Grilled BBQ</h3>
      <p>Juicy grilled skewers with smoky flavor</p>
    </div>

    <div class="food-item">
      <img src="images/momo.jpg" alt="Momo">
      <h3>Momo</h3>
      <p>Steamed dumplings with spicy chutney</p>
    </div>

    <div class="food-item">
      <img src="images/noodles.jpg" alt="Noodles">
      <h3>Chowmein</h3>
      <p>Stir-fried noodles with fresh veggies</p>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>© 2026 Modern Bhatti | All Rights Reserved</p>
</div>

</body>
</html>
